name: CI

on:
  pull_request:
  push:
    branches: [main, production-hardening]

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: node --check mini_app/app.js
      - run: pytest -q --cov=trading_bot --cov-report=term --cov-fail-under=30
      - run: pip-audit -r requirements.txt
      - run: |
          python scripts/migrate.py /tmp/empty.sqlite3
          python scripts/migrate.py /tmp/empty.sqlite3

