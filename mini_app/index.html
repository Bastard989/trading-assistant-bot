<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="space-backdrop" aria-hidden="true">
      <img src="/static/assets/black-hole.png" alt="" />
      <div class="starfield"></div>
      <div class="scanline"></div>
    </div>
    <main class="app">
      <header class="topbar">
        <div class="brand-block">
          <span class="eyebrow">Кабинет трейдера</span>
          <h1>Trading Assistant</h1>
          <p id="planText">План не загружен</p>
        </div>
        <button id="refreshBtn" class="icon-btn" title="Обновить" aria-label="Обновить данные">↻</button>
      </header>

      <nav class="tabs" aria-label="Разделы">
        <button class="tab active" data-view="dashboard">Пульт</button>
        <button class="tab" data-view="trades">Сделки</button>
        <button class="tab" data-view="calculator">Калькулятор</button>
        <button class="tab" data-view="context">Контекст</button>
        <button class="tab" data-view="journal">Дневник</button>
        <button class="tab" data-view="templates">Макеты</button>
      </nav>

      <section id="dashboard" class="view active">
        <div class="metrics">
          <div class="metric"><span>PnL</span><strong id="netPnl">0</strong></div>
          <div class="metric"><span>Winrate</span><strong id="winrate">0%</strong></div>
          <div class="metric"><span>Риск в рынке</span><strong id="openRisk">0</strong></div>
          <div class="metric"><span>Алерты</span><strong id="alertCount">0</strong></div>
        </div>
        <section class="band">
          <h2>Watchlist</h2>
          <div id="watchlist" class="chips"></div>
        </section>
        <section class="band">
          <h2>Открытые сделки</h2>
          <div id="openTrades" class="table"></div>
        </section>
      </section>

      <section id="trades" class="view">
        <div class="toolbar">
          <button class="seg active" data-status="">Все</button>
          <button class="seg" data-status="open">Open</button>
          <button class="seg" data-status="closed">Closed</button>
        </div>
        <div id="tradesTable" class="table"></div>
      </section>

      <section id="calculator" class="view">
        <form id="riskForm" class="form-grid">
          <label>Монета<input name="symbol" value="BTC" /></label>
          <label>Сторона<select name="side"><option>long</option><option>short</option></select></label>
          <label>Депозит<input name="account" type="number" value="1000" /></label>
          <label>Риск %<input name="risk_percent" type="number" step="0.1" value="1" /></label>
          <label>Вход<input name="entry" type="number" step="0.0001" value="65000" /></label>
          <label>Стоп<input name="stop" type="number" step="0.0001" value="64000" /></label>
          <label>Тейк<input name="target" type="number" step="0.0001" value="68000" /></label>
          <label>Плечо<input name="leverage" type="number" step="0.1" value="5" /></label>
        </form>
        <section class="band">
          <h2>Расчет</h2>
          <pre id="riskResult">Заполни форму</pre>
          <button id="reviewBtn" class="primary-action" type="button">Проверить сделку</button>
          <pre id="reviewResult"></pre>
        </section>
      </section>

      <section id="context" class="view">
        <div id="contextsList" class="table"></div>
      </section>

      <section id="journal" class="view">
        <div id="journalList" class="table"></div>
      </section>

      <section id="templates" class="view">
        <section class="band">
          <h2>Макеты заметок</h2>
          <div id="templatesList" class="template-list"></div>
        </section>
      </section>
    </main>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
